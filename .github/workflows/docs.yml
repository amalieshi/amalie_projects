name: Build and Deploy Documentation

on:
  # Triggers the workflow on push to the main branch
  push:
    branches: [ main, master ]
    paths:
      - "shared/docs/sphinx-site/**"
      - ".github/workflows/docs.yml"
      - "python/**/README.md"
      - "csharp/**/README.md" 
      - "frontend/**/README.md"
      - "machine-learning/**/README.md"
      - "**/pyproject.toml"
      - "**/requirements.txt"

  # Allows manual triggering from the Actions tab
  workflow_dispatch:

    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for better build context

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache pip dependencies only
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{
            hashFiles('shared/docs/sphinx-site/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd shared/docs/sphinx-site
          pip install -e ".[dev,enhanced]"

      - name: Clean previous builds
        run: |
          cd shared/docs/sphinx-site
          python docs.py clean
          # Remove all cached Sphinx data
          rm -rf build/.doctrees 2>/dev/null || true
          rm -rf build/.buildinfo 2>/dev/null || true
          find build -name "*.pickle" -delete 2>/dev/null || true
          find build -name "environment.pickle" -delete 2>/dev/null || true

      - name: Build documentation
        run: |
          cd shared/docs/sphinx-site
          python docs.py build

          # Create .nojekyll to bypass Jekyll processing
          touch build/html/.nojekyll

          # Copy CNAME if it exists (for custom domains)
          if [ -f CNAME ]; then
            cp CNAME build/html/
          fi

      - name: Upload documentation artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: shared/docs/sphinx-site/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && comment.body.includes('Documentation Preview')
            );

            const commentBody = `**Documentation Preview**

            Your documentation changes have been built successfully!

            **Preview URL**: ${{ steps.deployment.outputs.page_url }}

            The preview will be available once the deployment completes (usually 1-2 minutes).`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

  # Optional: Build check for PRs (without deployment)
  build-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd shared/docs/sphinx-site
          pip install -e ".[dev,enhanced]"

      - name: Build documentation (check only)
        run: |
          cd shared/docs/sphinx-site
          python setup_external_docs.py
          python docs.py clean
          python docs.py build

          # Check for broken links (if sphinx-linkcheck is configured)
          # make linkcheck

      - name: Check build size
        run: |
          cd shared/docs/sphinx-site/build/html
          SIZE=$(du -sh . | cut -f1)
          echo "Documentation build size: $SIZE"

          # Warn if build is larger than 100MB
          SIZE_MB=$(du -sm . | cut -f1)
          if [ $SIZE_MB -gt 100 ]; then
            echo "Warning: Documentation build is larger than 100MB"
            echo "Consider optimizing images or splitting large files"
          fi

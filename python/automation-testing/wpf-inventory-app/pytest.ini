[tool:pytest]
# PyTest configuration for WPF Inventory Management App automation tests

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test execution
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --log-cli-level=INFO
    --log-cli-format=%(asctime)s [%(levelname)8s] %(name)s: %(message)s
    --log-cli-date-format=%Y-%m-%d %H:%M:%S
    --capture=no

# Test markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    performance: marks tests as performance tests
    integration: marks tests as integration tests
    smoke: marks tests as smoke tests
    ui: marks tests as UI automation tests

# Test timeouts
timeout = 300  # 5 minutes default timeout for tests
timeout_method = thread

# Minimum version requirements
minversion = 6.0

# Test paths
testpaths = tests

# Ignore paths
norecursedirs = 
    .git
    .tox
    *.egg
    build
    dist
    __pycache__
    screenshots
    performance_results

# Console output
console_output_style = progress

# Warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning:pywinauto.*
